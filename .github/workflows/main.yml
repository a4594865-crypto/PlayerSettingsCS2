name: PlayerSettings build and release

on:
  pull_request:
    branches: [ "main" ]
  release:
    types:
      - created
  workflow_dispatch:

jobs:
  build:
    permissions: write-all
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: 'preview' # 🎯 確保順利調用 .NET 10 環境
      
      - name: Restore dependencies
        run: |
          dotnet restore PlayerSettingsApi/PlayerSettingsApi.csproj
          dotnet restore PlayerSettings/PlayerSettings.csproj
      
      # 🎯 修正 1：編譯 API，並加上防線參數，輸出至特定暫存區
      - name: Build PlayerSettingsApi
        run: |
          dotnet build PlayerSettingsApi/PlayerSettingsApi.csproj -c Release --no-restore --no-self-contained -p:CopyLocalLockFileAssemblies=false

      # 🎯 修正 2：編編譯主插件，並且直接指定輸出路徑為 CounterStrikeSharp 標準的插件目錄結構！
      # 這樣會自動在雲端建立好 addons/counterstrikesharp/plugins/PlayerSettings/ 資料夾，並把最乾淨的 3 個檔案吐進去
      - name: Build PlayerSettings
        run: |
          dotnet build PlayerSettings/PlayerSettings.csproj -c Release --no-restore -o ./addons/counterstrikesharp/plugins/PlayerSettings --no-self-contained -p:CopyLocalLockFileAssemblies=false

      # 🎯 修正 3：因為上面已經把檔案乖乖吐進 ./addons/ 了，這裡的 zip 就能完美抓到東西打包！
      - name: Create release asset
        if: github.event_name == 'release'
        run: zip -r PlayerSettings-${{ github.event.release.tag_name }}.zip ./addons/

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./PlayerSettings-${{ github.event.release.tag_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
